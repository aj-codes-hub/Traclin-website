<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAQ</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/faq&Contect.css" />
  </head>
  <body style="background-color: #f5f6fa">
    <!-- FAQ Section -->
    <div>
      <div class="faq-section">
        <div
          class="d-flex justify-content-between align-items-center d-lg-none mb-4"
        >
          <h1 class="faq-title-mobile mb-0">FAQ's</h1>
          <button class="btn p-0 border-0 bg-transparent">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#333333"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
        </div>

        <div class="d-none d-lg-block text-center mb-5">
          <h1 class="faq-title-desktop">
            Frequently asked questions
          </h1>
          <p class="faq-subtitle">
            Jobs that are available from us and looking for their own people!
            Browse our vacancies and find the one that is right for you!
          </p>
        </div>

        <div class="d-flex flex-column gap-3 d-lg-none" id="faq-mobile"></div>

        <div id="faq-desktop" style="display: none">
          <div class="row g-4">
            <div class="col-6" id="faq-left"></div>
            <div class="col-6" id="faq-right"></div>
          </div>
        </div>

        <div class="d-flex justify-content-center mt-5 pb-3">
          <button class="faq-cta-btn">
            Still have unanswered questions? Get in touch
          </button>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/faq&Contect.js"></script>
  </body>
</html>
